# --- weezterm remote features ---
# Fork-specific Windows build pipeline for Weezterm.
# Based on gen_windows.yml from upstream, adapted for fork branches.
# --- end weezterm remote features ---
name: weezterm-windows

on:
  push:
    branches:
      - main
      - "feature/**"
      - "ci/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: "windows-2022"

    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      RUSTUP_WINDOWS_PATH_ADD_BIN: "1"

    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: "Install Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          target: "x86_64-pc-windows-msvc"

      - name: "Compile with sccache"
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Cache Rust Dependencies"
        uses: actions/cache@v4
        id: cache-cargo-vendor
        with:
          path: |
            vendor
            .cargo/config
          key: "cargo-deps-${{ hashFiles('**/Cargo.lock') }}"

      - name: "Vendor dependencies"
        if: steps.cache-cargo-vendor.outputs.cache-hit != 'true'
        shell: bash
        run: "cargo vendor --locked --versioned-dirs >> .cargo/config"

      - name: "Build wezterm (Release mode)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p wezterm --release

      - name: "Build wezterm-gui (Release mode)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p wezterm-gui --release

      - name: "Build wezterm-mux-server (Release mode)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p wezterm-mux-server --release

      - name: "Build strip-ansi-escapes (Release mode)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p strip-ansi-escapes --release

      - name: "Install cargo-nextest"
        uses: baptiste0928/cargo-install@v3
        with:
          crate: "cargo-nextest"
          cache-key: "windows"

      - name: "Test"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo nextest run --all --no-fail-fast

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "weezterm-windows"
          path: |
            target/release/wezterm.exe
            target/release/wezterm-gui.exe
            target/release/wezterm-mux-server.exe
            target/release/strip-ansi-escapes.exe
